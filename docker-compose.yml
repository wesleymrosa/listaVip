version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: listavip-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: listavip
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: listavip-backend
    environment:
      - DATABASE_URL=host=db user=postgres password=postgres dbname=listavip port=5432 sslmode=disable TimeZone=UTC
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: listavip-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Impede que o volume local sobrescreva o node_modules do container
    environment:
      - CHOKIDAR_USEPOLLING=true # Fallback para watch de arquivos no Windows
    depends_on:
      - backend

volumes:
  db-data:
